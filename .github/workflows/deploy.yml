name: Deploy Data to GitHub Pages

on:
  push:
    branches:
      - api-data

permissions:
  contents: read
  pages: write
  id-token: write

# 환경 변수 동시성 설정 (배포 중복 방지)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Copy CNAME to v2
        run: |
          if [ -f "CNAME" ]; then
            cp CNAME v2/
            echo "✅ CNAME copied to v2/"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # v2 폴더만 배포 (Static API 루트)
          path: './v2'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Trigger Frontend Revalidation
        if: success()
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if [[ $COMMIT_MSG == *"MG더뱅킹 패치"* ]]; then
            # 패치 시에는 핵심 데이터만 재검증
            TAGS='["main", "rates"]'
            TYPE="MG더뱅킹 패치"
          else
            # 그 외(전수동기화 등)에는 전체 재검증
            TAGS='["main", "summary", "rates", "branch"]'
            TYPE="전체 동기화"
          fi
          
          echo "🚀 Deployment Successful ($TYPE). Triggering revalidation for $TAGS..."
          curl -X POST "${{ secrets.SITE_URL }}/api/revalidate" \
            -H "x-revalidate-secret: ${{ secrets.REVALIDATE_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"tags\": $TAGS}"
