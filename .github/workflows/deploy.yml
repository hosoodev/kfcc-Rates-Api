name: Deploy Data to GitHub Pages

on:
  push:
    branches:
      - api-data

permissions:
  contents: read
  pages: write
  id-token: write

# 환경 변수 동시성 설정 (배포 중복 방지)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    if: contains(github.event.head_commit.message, 'MG더뱅킹 패치')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Copy Static Files to v2
        run: |
          if [ -f "CNAME" ]; then
            cp CNAME v2/
            echo "✅ CNAME copied to v2/"
          fi
          if [ -f "robots.txt" ]; then
            cp robots.txt v2/
            echo "✅ robots.txt copied to v2/"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # v2 폴더만 배포 (Static API 루트)
          path: './v2'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Trigger Frontend Revalidation
        if: success()
        run: |
          echo "🚀 Deployment successful. Triggering revalidation..."
          curl -X POST "${{ secrets.SITE_URL }}/api/revalidate" \
            -H "x-revalidate-secret: ${{ secrets.REVALIDATE_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"tags": ["main", "summary", "rates", "branch"]}'
            --retry 3 \
           --retry-delay 5 \
           --max-time 30 \
           --fail
