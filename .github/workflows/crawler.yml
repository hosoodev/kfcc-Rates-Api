name: Daily KFCC Crawler

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      cleanup_days:
        description: '정리할 오래된 데이터 일수'
        required: false
        default: '365'
        type: string
      collect_grades:
        description: '경영실태평가 수집 여부'
        required: false
        default: false
        type: boolean

concurrency:
  group: daily-kfcc-crawler
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-24.04
    container:
      image: python:3.12-slim
    timeout-minutes: 180
    env:
      TZ: Asia/Seoul
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Install Git
        run: |
          apt-get update
          apt-get install -y git
          git config --global --add safe.directory /__w/kfcc-Rates-Api/kfcc-Rates-Api

      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Checkout api-data branch
        uses: actions/checkout@v4.2.2
        with:
          ref: api-data
          path: api-data
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Cache pip dependencies
        uses: actions/cache@v4.2.3
        with:
          path: /root/.cache/pip
          key: pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data directories
        run: mkdir -p data/rates logs

      - name: Run crawler (with retry)
        uses: nick-fields/retry@v3.0.2
        with:
          timeout_minutes: 60
          max_attempts: 3
          command: |
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              python src/main.py --cleanup ${{ github.event.inputs.cleanup_days }} --base-dir api-data
            else
              python src/main.py --cleanup 30 --base-dir api-data
            fi

      - name: Run mobile patch crawler (with retry)
        uses: nick-fields/retry@v3.0.2
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: python src/main.py --mode patch --base-dir api-data

      - name: Collect grade evaluations (with retry)
        if: >
          github.event.schedule == '0 5 15 1 *' ||
          github.event.schedule == '0 5 15 7 *' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.collect_grades == 'true')
        uses: nick-fields/retry@v3.0.2
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: python src/main.py --grades --base-dir api-data

      - name: Check for changes
        id: verify-changed-files
        run: |
          cd api-data
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          cd api-data
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git add v2/
          [ -f "CNAME" ] && git add CNAME
          git commit -m "일일 크롤링: 금리 데이터 업데이트 $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M:%S KST')" || exit 0
          git push origin api-data

      - name: Upload data as artifact
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: kfcc-data-${{ github.run_number }}
          path: api-data/data/
          retention-days: 7

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ 크롤링이 실패했습니다. 로그를 확인해주세요."
          echo "실행 시간: $(date)"
          echo "워크플로우 URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"