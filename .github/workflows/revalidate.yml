name: Trigger Frontend Revalidation (수동)
on:
  workflow_dispatch:

jobs:
  revalidate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Frontend Revalidation
        run: |
          echo "🚀 Triggering revalidation manually..."
          curl -X POST "${{ secrets.SITE_URL }}/api/revalidate" \
               -H "x-revalidate-secret: ${{ secrets.REVALIDATE_SECRET }}" \
               -H "Content-Type: application/json" \
               -H "User-Agent: MGija-Sync-Engine/2.1" \
               -d '{"tags": ["main", "summary", "rates", "branch"]}' \
               --retry 3 \
               --retry-delay 5 \
               --max-time 30 \
               --fail
