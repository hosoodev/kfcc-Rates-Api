name: Scheduled mBank Patch Crawler

on:
  schedule:
    # 한국 시간(KST) 평일 08:00, 10:00, 12:00, 14:00, 16:00, 18:00, 21:00 (UTC 기준 평일 23:00, 01:00, 03:00, 05:00, 07:00, 09:00, 12:00) 정각 실행
    - cron: '0 23,1,3,5,7,9,12,15,18 * * 1-5'
  workflow_dispatch:
    inputs:
      regions:
        description: '패치할 지역 (콤마로 구분)'
        required: false
        default: 'all'
        type: string

jobs:
  patch:
    runs-on: ubuntu-latest
    container:
      image: python:3.12-slim
    env:
      TZ: Asia/Seoul
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Install Git
        run: |
          apt-get update
          apt-get install -y git
          git config --global --add safe.directory /__w/kfcc-Rates-Api/kfcc-Rates-Api

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Checkout api-data branch
        uses: actions/checkout@v4
        with:
          ref: api-data
          path: api-data
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run patch crawler
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python src/main.py --mode patch --base-dir api-data
          else
            python src/main.py --mode patch --base-dir api-data
          fi

      - name: Check for changes
        id: verify-changed-files
        run: |
          cd api-data
          if [ -n "$(git status --porcelain v2/)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push V2 changes to api-data
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          cd api-data
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add v2/
          git commit -m "NG더뱅킹 패치: 모바일뱅킹 데이터 업데이트 $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M:%S KST')" || exit 0
          git push origin api-data
