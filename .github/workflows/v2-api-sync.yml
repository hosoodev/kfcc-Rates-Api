name: Sync V2 API Data

on:
  workflow_run:
    # 🚨 Base, Grade, Patch, Init 워크플로우 완료 시 자동 실행
    workflows: ["Daily KFCC Crawler", "Grade Crawler", "Hourly mBank Patch Crawler", "Initialize V2 Data"]
    types:
      - completed
  workflow_dispatch:

jobs:
  sync-v2:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Deploy to api-data branch
        run: |
          echo "🚀 V1 & V2 API 데이터 동기화 및 패키징 시작..."
          
          if [ ! -d "data/v2" ]; then
            echo "⚠️ data/v2 디렉토리가 없습니다. 동기화를 중단합니다."
            exit 0
          fi

          # 1. 배포용 임시 루트 디렉토리 생성
          mkdir -p /tmp/api_root
          
          # [V1 레거시 경로 세팅]
          mkdir -p /tmp/api_root/data/rates
          mkdir -p /tmp/api_root/data/grades
          
          # [V2 전용 경로 세팅]
          mkdir -p /tmp/api_root/v2/rates
          mkdir -p /tmp/api_root/v2/grades
          mkdir -p /tmp/api_root/v2/meta
          mkdir -p /tmp/api_root/v2/top/m

          # ---------------------------------------------------------
          # 2. V1 레거시 데이터 복사 (현재 라이브 서비스 무중단 유지용)
          # ---------------------------------------------------------
          # V1 금리 데이터 (json, gz 모두 포함)
          if [ -d "data/rates" ]; then
            cp -r data/rates/* /tmp/api_root/data/rates/
          fi
          # V1 경영 데이터
          if [ -d "data/grades" ]; then
            cp -r data/grades/* /tmp/api_root/data/grades/
          fi
          # V1 메타 데이터 (루트에 있는 banks.json, banks.json.gz, summary.json 등)
          if [ -f "data/banks.json" ]; then
            cp data/banks.json /tmp/api_root/data/
          fi
          if [ -f "data/banks.json.gz" ]; then
            cp data/banks.json.gz /tmp/api_root/data/
          fi
          if [ -f "data/summary.json" ]; then
            cp data/summary.json /tmp/api_root/data/
          fi
          if [ -f "data/summary.json.gz" ]; then
            cp data/summary.json.gz /tmp/api_root/data/
          fi

          # ---------------------------------------------------------
          # 3. V2 전용 데이터 복사 (V2 프론트엔드용, 모두 v2/ 하위로 묶음)
          # ---------------------------------------------------------
          # V2 금리 데이터
          cp -r data/v2/* /tmp/api_root/v2/rates/
          
          # V2 경영 데이터 (V2에서도 동일한 원본 파일 참조)
          if [ -d "data/grades" ]; then
            cp -r data/grades/* /tmp/api_root/v2/grades/
          fi
          
          # V2 전용 메타 데이터 (본점 포함 계층형 구조)
          if [ -d "data/meta" ]; then
            cp -r data/meta/* /tmp/api_root/v2/meta/
          fi

          # 4. CNAME 파일 복사
          if [ -f "CNAME" ]; then
            cp CNAME /tmp/api_root/
          fi

          # ---------------------------------------------------------
          # 5. api-data 브랜치로 전환 및 데이터 교체
          # ---------------------------------------------------------
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if git rev-parse --verify origin/api-data >/dev/null 2>&1; then
            git checkout api-data
          else
            git checkout --orphan api-data
            git rm -rf .
          fi

          # 기존 파일 삭제 후 새 파일 덮어쓰기
          rm -rf *
          cp -r /tmp/api_root/* .
          
          git add .
          git commit -m "자동 동기화: V1 & V2 API 데이터 업데이트 $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M:%S KST')" || exit 0
          git push origin api-data