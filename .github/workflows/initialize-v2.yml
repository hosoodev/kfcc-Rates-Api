name: Initialize V2 Data

on:
  workflow_dispatch:

jobs:
  initialize:
    runs-on: ubuntu-latest
    container:
      image: python:3.12-slim
    env:
      TZ: Asia/Seoul

    steps:
      - name: Install Git
        run: |
          apt-get update
          apt-get install -y git
          git config --global --add safe.directory /__w/kfcc-Rates-Api/kfcc-Rates-Api

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Base Crawler (Initialize V2)
        run: python src/main.py --mode base

      - name: Commit and push initialized V2 data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git commit -m "Init: Initialize V2 data from scratch" || exit 0
          git pull --rebase origin main
          git push
