name: Grade Evaluation Crawler

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: '강제 실행 (월 제한 무시)'
        required: false
        default: false
        type: boolean
      evaluation_date:
        description: '평가 기준연월 (YYYYMM, 예: 202512)'
        required: false
        default: ''
        type: string

concurrency:
  group: grade-eval-crawler
  cancel-in-progress: false

jobs:
  collect_grades:
    runs-on: ubuntu-24.04
    container:
      image: python:3.12-slim
    timeout-minutes: 180
    env:
      TZ: Asia/Seoul
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Install Git
        run: |
          apt-get update
          apt-get install -y git
          git config --global --add safe.directory /__w/kfcc-Rates-Api/kfcc-Rates-Api

      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Cache pip dependencies
        uses: actions/cache@v4.2.3
        with:
          path: /root/.cache/pip
          key: pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data directories
        run: mkdir -p data/grades

      - name: Run grade crawler (with retry)
        uses: nick-fields/retry@v3.0.2
        with:
          timeout_minutes: 20
          max_attempts: 3
          command: |
            if [ -n "${{ github.event.inputs.evaluation_date }}" ]; then
              python src/main.py --grades --date "${{ github.event.inputs.evaluation_date }}"
            else
              python src/main.py --grades
            fi
        env:
          FORCE_RUN: ${{ github.event.inputs.force_run }}

      - name: Check for changes
        id: verify-changed-files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/grades/
          [ -f "CNAME" ] && git add CNAME
          git commit -m "비정기 크롤링: 경영실태평가 데이터 업데이트 $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M:%S KST')" || exit 0
          git push

      - name: Upload data as artifact
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: grade-data-${{ github.run_number }}
          path: data/grades/
          retention-days: 30